<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор ДКП - One AUTO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--tg-theme-secondary-bg-color, #f0f0f5); color: var(--tg-theme-text-color, #000); margin: 0; padding: 15px; box-sizing: border-box; }
        .container { max-width: 600px; margin: 0 auto; background: var(--tg-theme-bg-color, #fff); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { text-align: center; margin-top: 0; color: var(--tg-theme-button-color, #2481cc); font-size: 20px; }
        .section-title { font-weight: bold; font-size: 16px; margin: 20px 0 10px; padding-bottom: 5px; border-bottom: 2px solid var(--tg-theme-secondary-bg-color, #f0f0f5); color: var(--tg-theme-button-color, #2481cc); }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 13px; margin-bottom: 4px; font-weight: 500; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 15px; background: var(--tg-theme-bg-color, #fff); color: var(--tg-theme-text-color, #000); }
        input:focus { border-color: var(--tg-theme-button-color, #2481cc); outline: none; }
        .btn-submit { width: 100%; padding: 14px; background-color: var(--tg-theme-button-color, #2481cc); color: var(--tg-theme-button-text-color, #fff); border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .success-box { text-align: center; padding: 10px; }
        .text-preview { background: #f9f9f9; border: 1px dashed #ccc; padding: 15px; border-radius: 8px; text-align: left; white-space: pre-wrap; font-family: Courier, monospace; font-size: 12px; max-height: 300px; overflow-y: auto; margin-top: 15px; color: #333; }
    </style>
</head>
<body>

<div class="container" id="appContent">
    <h2>📄 Конструктор ДКП автомобиля</h2>
    
    <form id="dkpForm">
        <div class="section-title">1. Данные автомобиля</div>
        <div class="form-group">
            <label>Марка авто *</label>
            <input type="text" id="brand" placeholder="Например: Toyota" required>
        </div>
        <div class="form-group">
            <label>Модель авто *</label>
            <input type="text" id="model" placeholder="Например: Camry" required>
        </div>
        <div class="form-group">
            <label>Год выпуска *</label>
            <input type="number" id="year" placeholder="2020" min="1950" max="2026" required>
        </div>
        <div class="form-group">
            <label>VIN-номер * (17 знаков)</label>
            <input type="text" id="vin" placeholder="Z8Nxxxxxxxxxxxxxx" style="text-transform: uppercase;" required>
        </div>
        <div class="form-group">
            <label>Номер двигателя</label>
            <input type="text" id="engine_number" placeholder="Если нет в ПТС — пусто">
        </div>
        <div class="form-group">
            <label>Модель двигателя</label>
            <input type="text" id="engine_model" placeholder="Например: 2AR-FE">
        </div>
        <div class="form-group">
            <label>Мощность (л.с.)</label>
            <input type="text" id="engine_power" placeholder="181">
        </div>
        <div class="form-group">
            <label>Объем двигателя (см³)</label>
            <input type="text" id="engine_volume" placeholder="2494">
        </div>
        <div class="form-group">
            <label>Номер шасси (рамы)</label>
            <input type="text" id="chassis_number" placeholder="Обычно отсутствует">
        </div>
        <div class="form-group">
            <label>Номер кузова</label>
            <input type="text" id="body_number" placeholder="Обычно совпадает с VIN">
        </div>
        <div class="form-group">
            <label>Цвет кузова *</label>
            <input type="text" id="body_color" placeholder="черный" required>
        </div>
        
        <div class="form-group">
            <label>Серия ПТС *</label>
            <input type="text" id="pts_series" placeholder="77 ТО" required>
        </div>
        <div class="form-group">
            <label>Номер ПТС *</label>
            <input type="text" id="pts_number" placeholder="123456" required>
        </div>
        <div class="form-group">
            <label>Дата выдачи ПТС *</label>
            <input type="text" id="pts_date" placeholder="12.05.2021" required>
        </div>
        <div class="form-group">
            <label>Кем выдан ПТС *</label>
            <input type="text" id="pts_issued_by" placeholder="ЦАТ ГИБДД" required>
        </div>

        <div class="form-group">
            <label>Серия СТС *</label>
            <input type="text" id="sts_series" placeholder="99 12" required>
        </div>
        <div class="form-group">
            <label>Номер СТС *</label>
            <input type="text" id="sts_number" placeholder="654321" required>
        </div>
        <div class="form-group">
            <label>Дата выдачи СТС *</label>
            <input type="text" id="sts_date" placeholder="15.05.2021" required>
        </div>
        <div class="form-group">
            <label>Кем выдан СТС *</label>
            <input type="text" id="sts_issued_by" placeholder="МОГТОРЭР №1" required>
        </div>
        <div class="form-group">
            <label>Госномер</label>
            <input type="text" id="gosnomer" placeholder="А123ВС 177">
        </div>
        <div class="form-group">
            <label>Стоимость авто * (в рублях цифрами)</label>
            <input type="number" id="price" placeholder="1500000" required>
        </div>

        <div class="section-title">2. Данные Продавца</div>
        <div class="form-group">
            <label>ФИО Продавца полностью *</label>
            <input type="text" id="seller_fio" placeholder="Иванов Иван Иванович" required>
        </div>
        <div class="form-group">
            <label>Дата рождения *</label>
            <input type="text" id="seller_birthdate" placeholder="10.02.1985" required>
        </div>
        <div class="form-group">
            <label>Серия и номер паспорта *</label>
            <input type="text" id="seller_passport" placeholder="4515 123456" required>
        </div>
        <div class="form-group">
            <label>Дата выдачи паспорта *</label>
            <input type="text" id="seller_passport_date" placeholder="20.02.2005" required>
        </div>
        <div class="form-group">
            <label>Кем выдан паспорт *</label>
            <input type="text" id="seller_passport_issued" placeholder="ТП №1 УФМС РОССИИ" required>
        </div>
        <div class="form-group">
            <label>Адрес регистрации *</label>
            <input type="text" id="seller_address" placeholder="г. Москва, ул. Ленина, д. 5, кв. 12" required>
        </div>

        <div class="section-title">3. Данные Покупателя</div>
        <div class="form-group">
            <label>ФИО Покупателя полностью *</label>
            <input type="text" id="buyer_fio" placeholder="Петров Петр Петрович" required>
        </div>
        <div class="form-group">
            <label>Дата рождения *</label>
            <input type="text" id="buyer_birthdate" placeholder="18.09.1992" required>
        </div>
        <div class="form-group">
            <label>Серия и номер паспорта *</label>
            <input type="text" id="buyer_passport" placeholder="6012 654321" required>
        </div>
        <div class="form-group">
            <label>Дата выдачи паспорта *</label>
            <input type="text" id="buyer_passport_date" placeholder="25.09.2012" required>
        </div>
        <div class="form-group">
            <label>Кем выдан паспорт *</label>
            <input type="text" id="buyer_passport_issued" placeholder="ОУФМС ПО РОСТОВСКОЙ ОБЛ." required>
        </div>
        <div class="form-group">
            <label>Адрес регистрации *</label>
            <input type="text" id="buyer_address" placeholder="г. Ростов-на-Дону, ул. Садовая, д. 10" required>
        </div>

        <div class="section-title">4. Место и дата сделки</div>
        <div class="form-group">
            <label>Город заключения договора *</label>
            <input type="text" id="deal_city" placeholder="Ростов-на-Дону" required>
        </div>
        <div class="form-group">
            <label>Дата заключения *</label>
            <input type="text" id="deal_date" placeholder="17.05.2026" required>
        </div>

        <button type="button" class="btn-submit" onclick="processDKP()">Сгенерировать договор</button>
    </form>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    function processDKP() {
        const form = document.getElementById('dkpForm');
        if (!form.checkValidity()) {
            form.reportValidity();
            return;
        }

        const d = (id) => document.getElementById(id).value || "—";
        
        const brand = d('brand');
        const model = d('model');
        const year = d('year');
        const priceNum = Number(d('price'));
        const priceStr = priceNum.toLocaleString('ru-RU');

        // Формируем чистый, красивый текстовый вариант для буфера обмена (идеально ложится в Word/Pages)
        const plainTextContract = `ДОГОВОР КУПЛИ-ПРОДАЖИ ТРАНСПОРТНОГО СРЕДСТВА

г. ${d('deal_city')}                                                                   «___» _______________ 2026 г.

Гражданин(ка) ${d('seller_fio')}, ${d('seller_birthdate')} года рождения, паспорт серия/номер: ${d('seller_passport')}, выдан ${d('seller_passport_date')} г., кем: ${d('seller_passport_issued')}, зарегистрированный(ая) по адресу: ${d('seller_address')}, именуемый(ая) в дальнейшем «Продавец», с одной стороны,

и гражданин(ка) ${d('buyer_fio')}, ${d('buyer_birthdate')} года рождения, паспорт серия/номер: ${d('buyer_passport')}, выдан ${d('buyer_passport_date')} г., кем: ${d('buyer_passport_issued')}, зарегистрированный(ая) по адресу: ${d('buyer_address')}, именуемый(ая) в дальнейшем «Покупатель», с другой стороны, заключили настоящий договор о нижеследующем:

1. ПРЕДМЕТ ДОГОВОРА
1.1. Продавец передаёт в собственность Покупателя, а Покупатель принимает и оплачивает транспортное средство со следующими характеристиками:
— Марка, модель: ${brand} ${model}
— Год выпуска: ${year}
— Идентификационный номер (VIN): ${d('vin').toUpperCase()}
— Номер двигателя: ${d('engine_number')}
— Модель двигателя: ${d('engine_model')}
— Мощность двигателя: ${d('engine_power')} л.с.
— Объём двигателя: ${d('engine_volume')} см³
— Номер шасси (рамы): ${d('chassis_number')}
— Номер кузова: ${d('body_number')}
— Цвет кузова: ${d('body_color')}
— Паспорт ТС (ПТС): серия ${d('pts_series')} № ${d('pts_number')}, выдан ${d('pts_date')} г. кем: ${d('pts_issued_by')}
— Свидетельство о регистрации (СТС): серия ${d('sts_series')} № ${d('sts_number')}, выдано ${d('sts_date')} г. кем: ${d('sts_issued_by')}
— Государственный регистрационный знак: ${d('gosnomer')}

2. ЦЕНА И ПОРЯДОК РАСЧЁТОВ
2.1. Стоимость указанного в п. 1.1 транспортного средства составляет ${priceStr} рублей 00 копеек.
2.2. Покупатель передал Продавцу денежные средства в полном объёме в момент подписания настоящего договора. Продавец денежные средства получил полностью.

3. ПЕРЕДАЧА ТРАНСПОРТНОГО СРЕДСТВА
3.1. Продавец гарантирует, что до заключения настоящего договора указанное транспортное средство никому не продано, не заложено, в споре и под арестом не состоит.
3.2. Право собственности на транспортное средство переходит к Покупателю с момента подписания настоящего договора.

4. ПРОЧИЕ УСЛОВИЯ
4.1. Настоящий договор составлен в 3 (трёх) экземплярах, имеющих равную юридическую силу, по одному для каждой из сторон и один — для предоставления в органы ГИБДД.

ПОДПИСИ СТОРОН:

Продавец: _________________ / ${d('seller_fio')}

Покупатель: _________________ / ${d('buyer_fio')}
`;

        // Копируем текст в буфер обмена устройства
        navigator.clipboard.writeText(plainTextContract).then(() => {
            showSuccessScreen(plainTextContract, brand, model, year);
        }).catch(err => {
            // Если автоматический буфер заблокирован политикой Mac, всё равно показываем экран, скопируют руками
            showSuccessScreen(plainTextContract, brand, model, year);
        });
    }

    function showSuccessScreen(text, brand, model, year) {
        const app = document.getElementById('appContent');
        app.innerHTML = `
            <div class="success-box">
                <h2>🎉 Договор успешно готов!</h2>
                <p style="color: #4caf50; font-weight: bold; font-size: 15px;">📋 Текст договора уже автоматически скопирован в ваш буфер обмена!</p>
                <p style="font-size: 14px; line-height: 1.4;">
                    <b>Что делать дальше:</b><br>
                    1. Откройте любую программу на Mac (<b>Pages, Microsoft Word, Заметки</b>).<br>
                    2. Создайте новый документ и нажмите <b>Cmd + V (Вставить)</b>.<br>
                    3. Распечатайте полученный текст в 3-х экземплярах.
                </p>
                
                <div class="hint" style="margin-top: 15px; font-weight: bold;">Ниже текст для ручного копирования (на случай если буфер не сработал):</div>
                <div class="text-preview">${text.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</div>
                
                <button class="btn-submit" onclick="closeWebApp('${brand}', '${model}', '${year}')">🔙 Вернуться в бот</button>
            </div>
        `;
    }

    function closeWebApp(brand, model, year) {
        // Отправляем анонимный сигнал боту и закрываем окно
        tg.sendData(`${brand} ${model} (${year} г.)`);
        tg.close();
    }
</script>

</body>
</html>
