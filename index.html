<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор ДКП - One AUTO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--tg-theme-secondary-bg-color, #f0f0f5); color: var(--tg-theme-text-color, #000); margin: 0; padding: 15px; box-sizing: border-box; }
        .container { max-width: 600px; margin: 0 auto; background: var(--tg-theme-bg-color, #fff); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2 { text-align: center; margin-top: 0; color: var(--tg-theme-button-color, #2481cc); font-size: 20px; }
        .section-title { font-weight: bold; font-size: 16px; margin: 20px 0 10px; padding-bottom: 5px; border-bottom: 2px solid var(--tg-theme-secondary-bg-color, #f0f0f5); color: var(--tg-theme-button-color, #2481cc); }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 13px; margin-bottom: 4px; font-weight: 500; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 15px; background: var(--tg-theme-bg-color, #fff); color: var(--tg-theme-text-color, #000); }
        input:focus { border-color: var(--tg-theme-button-color, #2481cc); outline: none; }
        .btn-submit { width: 100%; padding: 14px; background-color: var(--tg-theme-button-color, #2481cc); color: var(--tg-theme-button-text-color, #fff); border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📄 Конструктор ДКП автомобиля</h2>
    
    <form id="dkpForm">
        <div class="section-title">1. Данные автомобиля</div>
        <div class="form-group"><label>Марка авто *</label><input type="text" id="brand" placeholder="Toyota" required></div>
        <div class="form-group"><label>Модель авто *</label><input type="text" id="model" placeholder="Camry" required></div>
        <div class="form-group"><label>Год выпуска *</label><input type="number" id="year" placeholder="2020" required></div>
        <div class="form-group"><label>VIN-номер *</label><input type="text" id="vin" placeholder="Z8Nxxxxxxxxxxxxxx" style="text-transform: uppercase;" required></div>
        <div class="form-group"><label>Номер двигателя</label><input type="text" id="engine_number" placeholder="При наличии"></div>
        <div class="form-group"><label>Модель двигателя</label><input type="text" id="engine_model" placeholder="Например: 2AR-FE"></div>
        <div class="form-group"><label>Мощность (л.с.)</label><input type="text" id="engine_power" placeholder="181"></div>
        <div class="form-group"><label>Объем двигателя (см³)</label><input type="text" id="engine_volume" placeholder="2494"></div>
        <div class="form-group"><label>Номер шасси (рамы)</label><input type="text" id="chassis_number" placeholder="При наличии"></div>
        <div class="form-group"><label>Номер кузова</label><input type="text" id="body_number" placeholder="При наличии"></div>
        <div class="form-group"><label>Цвет кузова *</label><input type="text" id="body_color" placeholder="черный" required></div>
        
        <div class="form-group"><label>Серия ПТС *</label><input type="text" id="pts_series" placeholder="77 ТО" required></div>
        <div class="form-group"><label>Номер ПТС *</label><input type="text" id="pts_number" placeholder="123456" required></div>
        <div class="form-group"><label>Дата выдачи ПТС *</label><input type="text" id="pts_date" placeholder="12.05.2021" required></div>
        <div class="form-group"><label>Кем выдан ПТС *</label><input type="text" id="pts_issued_by" placeholder="ГИБДД" required></div>

        <div class="form-group"><label>Серия СТС *</label><input type="text" id="sts_series" placeholder="99 12" required></div>
        <div class="form-group"><label>Номер СТС *</label><input type="text" id="sts_number" placeholder="654321" required></div>
        <div class="form-group"><label>Дата выдачи СТС *</label><input type="text" id="sts_date" placeholder="15.05.2021" required></div>
        <div class="form-group"><label>Кем выдан СТС *</label><input type="text" id="sts_issued_by" placeholder="МРЭО" required></div>
        <div class="form-group"><label>Госномер</label><input type="text" id="gosnomer" placeholder="А123ВС 177"></div>
        <div class="form-group"><label>Стоимость авто * (цифрами)</label><input type="number" id="price" placeholder="1500000" required></div>

        <div class="section-title">2. Данные Продавца</div>
        <div class="form-group"><label>ФИО Продавца полностью *</label><input type="text" id="seller_fio" placeholder="Иванов Иван Иванович" required></div>
        <div class="form-group"><label>Дата рождения *</label><input type="text" id="seller_birthdate" placeholder="10.02.1985" required></div>
        <div class="form-group"><label>Серия и номер паспорта *</label><input type="text" id="seller_passport" placeholder="4515 123456" required></div>
        <div class="form-group"><label>Дата выдачи паспорта *</label><input type="text" id="seller_passport_date" placeholder="20.02.2005" required></div>
        <div class="form-group"><label>Кем выдан паспорт *</label><input type="text" id="seller_passport_issued" placeholder="УФМС" required></div>
        <div class="form-group"><label>Адрес регистрации *</label><input type="text" id="seller_address" placeholder="Адрес прописки" required></div>

        <div class="section-title">3. Данные Покупателя</div>
        <div class="form-group"><label>ФИО Покупателя полностью *</label><input type="text" id="buyer_fio" placeholder="Петров Петр Петрович" required></div>
        <div class="form-group"><label>Дата рождения *</label><input type="text" id="buyer_birthdate" placeholder="18.09.1992" required></div>
        <div class="form-group"><label>Серия и номер паспорта *</label><input type="text" id="buyer_passport" placeholder="6012 654321" required></div>
        <div class="form-group"><label>Дата выдачи паспорта *</label><input type="text" id="buyer_passport_date" placeholder="25.09.2012" required></div>
        <div class="form-group"><label>Кем выдан паспорт *</label><input type="text" id="buyer_passport_issued" placeholder="ОУФМС" required></div>
        <div class="form-group"><label>Адрес регистрации *</label><input type="text" id="buyer_address" placeholder="Адрес прописки" required></div>

        <div class="section-title">4. Место и дата сделки</div>
        <div class="form-group"><label>Город заключения договора *</label><input type="text" id="deal_city" placeholder="Ростов-на-Дону" required></div>
        <div class="form-group"><label>Дата заключения *</label><input type="text" id="deal_date" placeholder="18.05.2026" required></div>

        <button type="button" class="btn-submit" onclick="sendDataToBot()">Сформировать и отправить в бот</button>
    </form>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    function sendDataToBot() {
        const form = document.getElementById('dkpForm');
        if (!form.checkValidity()) {
            form.reportValidity();
            return;
        }

        const getVal = (id) => document.getElementById(id).value || "—";

        const dkpData = {
            brand: getVal('brand'),
            model: getVal('model'),
            year: getVal('year'),
            vin: getVal('vin'),
            engine_number: getVal('engine_number'),
            engine_model: getVal('engine_model'),
            engine_power: getVal('engine_power'),
            engine_volume: getVal('engine_volume'),
            chassis_number: getVal('chassis_number'),
            body_number: getVal('body_number'),
            body_color: getVal('body_color'),
            pts_series: getVal('pts_series'),
            pts_number: getVal('pts_number'),
            pts_date: getVal('pts_date'),
            pts_issued_by: getVal('pts_issued_by'),
            sts_series: getVal('sts_series'),
            sts_number: getVal('sts_number'),
            sts_date: getVal('sts_date'),
            sts_issued_by: getVal('sts_issued_by'),
            gosnomer: getVal('gosnomer'),
            price: getVal('price'),
            seller_fio: getVal('seller_fio'),
            seller_birthdate: getVal('seller_birthdate'),
            seller_passport: getVal('seller_passport'),
            seller_passport_date: getVal('seller_passport_date'),
            seller_passport_issued: getVal('seller_passport_issued'),
            seller_address: getVal('seller_address'),
            buyer_fio: getVal('buyer_fio'),
            buyer_birthdate: getVal('buyer_birthdate'),
            buyer_passport: getVal('buyer_passport'),
            buyer_passport_date: getVal('buyer_passport_date'),
            buyer_passport_issued: getVal('buyer_passport_issued'),
            buyer_address: getVal('buyer_address'),
            deal_city: getVal('deal_city'),
            deal_date: getVal('deal_date')
        };

        // Отправляем весь объект в виде JSON-строки прямо в Python
        tg.sendData(JSON.stringify(dkpData));
        tg.close();
    }
</script>
</body>
</html>
